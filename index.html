<!DOCTYPE html>
<Head>
	<Link href="https://fonts.googleapis.com/css2?family=Eater&display=swap" rel="stylesheet">
	<Style>
		body{
			background-color:black;
			margin:0;
			min-height: 100vh;
			display:flex;
			justify-content:center;
			align-items: center;
		}
		.container{
			display:flex;
			flex-direction:column;
			align-items: center;
			gap:20px;
		}
		#BTN{
			Font-family: 'Eater',cursive;
			font-size:6rem;
			color: red;
			text-shadow: 10px 10px 20px #bb0000;
			background-color : black;
			border:none;
			cursor:pointer;
		}
        .word {
            Font-family: 'Open Sans',cursive;
            font-size: 1.3rem;
            color: #bd1111;
            opacity: 0;
			transition:opacity 1.1s ease;
			display:inline-block;
			margin:0 4px;
        }
		.word.visible{opacity:1;}
	</style>
</head>
<body>
	<div class="container">
		<img src="Web page/Him.PNG">
		<button ID="BTN">
			START
		</button>
		<p id="Narration"></p>

	</div>
	<audio id="creepymusic" loop>
			<source src="CreepyMusic.mp3" type="audio/mpeg">
	</audio>
	<script>
		const lines = ["bananas","in pajamas"]
		const words = lines.join(" ").split(" ");
		let i = 0;
		document.getElementById("BTN").addEventListener("click",() =>{
			document.getElementById("creepymusic").play();
			words.forEach(
				w=>{const s=document.createElement("span");
				s.className = "word";
				s.textContent = w;
				document.getElementById("Narration").appendChild(s);
			});
			setInterval(()=>{
				if(i<words.length)document.querySelectorAll(".word")[i++].classList.add("visible");
			},500);
		});
	</script>
</body>
